<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark - Browse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Base ── */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f0fdf4 0%, #f8fafc 40%, #f0fdf4 100%);
      min-height: 100vh;
      position: relative;
    }

    /* ── Subtle ambient blobs ── */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(34,197,94,0.08), transparent 70%);
      top: -200px; right: -200px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(134,239,172,0.08), transparent 70%);
      bottom: -150px; left: -150px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Navbar ── */
    .navbar {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(229,231,235,0.5);
      padding: 0 32px;
      height: 64px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.04);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-small {
      font-size: 20px;
      font-weight: 800;
      color: #16a34a;
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 100%;
    }

    .nav-links a {
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .nav-links a:hover {
      background: #f0fdf4;
      color: #16a34a;
    }
    .nav-links a.active {
      background: #f0fdf4;
      color: #16a34a;
      font-weight: 700;
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 14px 4px 8px;
      border-radius: 24px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      margin-left: 12px;
      transition: all 0.2s ease;
      cursor: default;
    }
    .nav-user:hover {
      background: #dcfce7;
      box-shadow: 0 2px 12px rgba(22,163,74,0.1);
    }

    .nav-user-avatar-placeholder {
      width: 30px; height: 30px; border-radius: 50%;
      background: #86efac;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: white; flex-shrink: 0;
    }

    .nav-user-name {
      font-size: 13px; font-weight: 600; color: #1a1a2e;
    }

    .btn-logout {
      background: none; border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 7px 16px; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; color: #6b7280; transition: all 0.2s ease; margin-left: 8px;
    }
    .btn-logout:hover {
      border-color: #16a34a; color: #16a34a; background: #f0fdf4;
    }

    /* ── Page layout ── */
    .page-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 28px 60px;
      position: relative;
      z-index: 1;
    }

    .browse-header {
      margin-bottom: 36px;
    }
    .browse-header h2 {
      font-size: 28px;
      font-weight: 800;
      color: #1a1a2e;
      margin: 0 0 6px;
      letter-spacing: -0.5px;
    }
    .browse-header .subtitle {
      font-size: 15px;
      color: #6b7280;
      margin: 0;
      font-weight: 400;
    }

    /* ── Members grid ── */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      animation: gridFadeIn 0.5s ease-out;
    }
    @keyframes gridFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Member card ── */
    .member-card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(229,231,235,0.6);
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .member-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(22,163,74,0.12);
      border-color: rgba(34,197,94,0.2);
    }

    /* ── Photo area ── */
    .member-photo-wrap {
      position: relative;
      width: 96px; height: 96px;
      flex-shrink: 0;
      margin: 24px auto 8px;
    }
    .member-photo {
      width: 96px; height: 96px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #f0fdf4;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }
    .member-card:hover .member-photo {
      transform: scale(1.05);
    }
    .member-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: all 0.2s ease;
      z-index: 2;
    }
    .status-dot.online { background: #22c55e; }
    .status-dot.offline { background: #9ca3af; }

    /* ── Card info ── */
    .member-info {
      padding: 8px 20px 4px;
      text-align: center;
      flex: 1;
    }
    .member-info h3 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      margin: 0 0 2px;
      letter-spacing: -0.3px;
    }
    .member-meta {
      font-size: 13px;
      color: #6b7280;
      margin: 0 0 6px;
      font-weight: 500;
    }
    .member-status {
      font-size: 12px;
      font-weight: 600;
      margin: 0 0 8px;
    }
    .member-status.is-online { color: #16a34a; }
    .member-status.is-offline { color: #9ca3af; }
    .member-bio {
      font-size: 13px;
      color: #6b7280;
      margin: 0;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Message button ── */
    .btn-chat {
      margin: 12px 16px 18px;
      padding: 11px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: -0.01em;
    }
    .btn-chat:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(22,163,74,0.3);
    }
    .btn-chat:active {
      transform: translateY(0);
    }

    /* ── Loading state ── */
    .loading {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: #6b7280;
      font-size: 15px;
      font-weight: 500;
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: #6b7280;
    }
    .empty-state span { font-size: 48px; display: block; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; line-height: 1.6; }

    /* ── Error ── */
    .error-msg {
      grid-column: 1/-1;
      color: #dc2626;
      font-size: 14px;
      padding: 12px 16px;
      background: #fef2f2;
      border-radius: 12px;
      border: 1px solid #fecaca;
      text-align: center;
    }

    /* ── Footer ── */
    .page-footer {
      text-align: center;
      padding: 20px 24px;
      border-top: 1px solid #e5e7eb;
      margin-top: 40px;
      background: rgba(255,255,255,0.6);
      position: relative;
      z-index: 1;
    }
    .page-footer a {
      color: #6b7280;
      font-size: 12px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .page-footer a:hover { color: #16a34a; text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .navbar { padding: 0 16px; }
      .nav-links a { padding: 8px 12px; font-size: 13px; }
      .page-container { padding: 28px 16px 40px; }
      .browse-header h2 { font-size: 22px; }
      .members-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="browse.html" class="logo-small">✦ Spark</a>
    <div class="nav-links">
      <a href="browse.html" class="active">Browse</a>
      <a href="chat.html">Chat</a>
      <a href="profile.html">Profile</a>
      <div class="nav-user">
        <div class="nav-user-avatar-placeholder" id="navInitial">?</div>
        <span class="nav-user-name" id="navName">...</span>
      </div>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="page-container">
    <div class="browse-header">
      <h2>Discover People</h2>
      <p class="subtitle">Find someone you'd like to connect with</p>
    </div>

    <div id="membersGrid" class="members-grid">
      <div class="loading">Loading members...</div>
    </div>
  </div>

  <script>
    if (!localStorage.getItem('token')) window.location.href = 'index.html';
    const token = localStorage.getItem('token');

    window.loadMembers = async function loadMembers() {
      try {
        const res = await fetch('/api/members', { headers: { Authorization: `Bearer ${token}` } });
        const members = await res.json();
        const grid = document.getElementById('membersGrid');

        if (!members.length) {
          grid.innerHTML = '<div class="empty-state"><span>👥</span><p>No other members yet.<br>Invite friends to join!</p></div>';
          return;
        }

        grid.innerHTML = members.map(m => `
          <div class="member-card" onclick="startChat(${m.id}, '${escapeHtml(m.name || m.username)}')">
            <div class="member-photo-wrap" data-uid="${m.id}">
              <div class="member-photo">
                <img src="${m.photo || ''}" alt="${escapeHtml(m.name || m.username)}"
                  onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23dcfce7%22/><text y=%22.9em%22 font-size=%2260%22 x=%2210%22>👤</text></svg>'">
              </div>
              <span class="status-dot ${m.online ? 'online' : 'offline'}"></span>
            </div>
            <div class="member-info">
              <h3>${escapeHtml(m.name || m.username)}</h3>
              <p class="member-meta">${m.age ? m.age + ' · ' : ''}${escapeHtml(m.gender || '')}</p>
              <p class="member-status ${m.online ? 'is-online' : 'is-offline'}" data-uid="${m.id}">
                ${m.online ? 'Online' : (m.lastSeen ? 'Offline · ' + timeAgo(m.lastSeen) : 'Offline')}
              </p>
              <p class="member-bio">${escapeHtml(m.bio || 'No bio yet')}</p>
            </div>
            <button class="btn-chat">Message</button>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('membersGrid').innerHTML = '<div class="error-msg">Failed to load members.</div>';
      }
    }

    function startChat(userId, name) {
      window.location.href = `chat.html?with=${userId}&name=${encodeURIComponent(name)}`;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function timeAgo(iso) {
      if (!iso) return 'a while ago';
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days}d ago`;
      return new Date(iso).toLocaleDateString();
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    loadMembers();
  </script>
  <script src="nav.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="global.js"></script>
  <div class="page-footer">
    <a href="terms.html">Terms &amp; Conditions</a>
    <span style="color:var(--border);margin:0 8px;">|</span>
    <a href="privacy.html">Privacy</a>
    <span style="color:var(--border);margin:0 8px;">|</span>
    <a href="faq.html">FAQ</a>
  </div>
</body>
</html>

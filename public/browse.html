<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark - Discover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f0fdf4 0%, #f8fafc 40%, #f0fdf4 100%);
      min-height: 100vh;
      position: relative;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(34,197,94,0.08), transparent 70%);
      top: -200px; right: -200px;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(134,239,172,0.08), transparent 70%);
      bottom: -150px; left: -150px;
    }

    .page-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px 60px;
      position: relative;
      z-index: 1;
    }

    /* ── Hero ── */
    .discover-hero {
      margin-bottom: 28px;
    }
    .discover-hero h1 {
      font-size: 28px; font-weight: 800; color: #1a1a2e;
      margin: 0 0 4px; letter-spacing: -0.5px;
    }
    .discover-hero h1 span { color: #16a34a; }
    .discover-hero p {
      font-size: 15px; color: #6b7280; margin: 0; font-weight: 400;
    }

    /* ── Filter Tabs ── */
    .filter-tabs {
      display: flex; gap: 6px; margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: 8px 18px; border-radius: 24px;
      border: 1px solid #e5e7eb; background: white;
      font-size: 13px; font-weight: 600; color: #6b7280;
      cursor: pointer; transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }
    .filter-tab:hover { border-color: #bbf7d0; color: #16a34a; background: #f0fdf4; }
    .filter-tab.active { background: #16a34a; color: white; border-color: #16a34a; box-shadow: 0 2px 8px rgba(22,163,74,0.2); }

    /* ── Section ── */
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-head h3 {
      font-size: 16px; font-weight: 700; color: #1a1a2e; margin: 0;
      display: flex; align-items: center; gap: 8px;
    }
    .section-head .sub-label {
      font-size: 12px; color: #9ca3af; font-weight: 400; margin-left: 4px;
    }
    .section-head .view-all {
      font-size: 13px; color: #16a34a; text-decoration: none;
      font-weight: 600; transition: color 0.2s;
    }
    .section-head .view-all:hover { color: #15803d; }
    .discover-section { margin-bottom: 32px; }

    /* ── Member Grid ── */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
    }
    @media (min-width: 900px) {
      .members-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── Member Card ── */
    .member-card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(229,231,235,0.5);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      padding: 22px 18px 16px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
    }
    .member-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(22,163,74,0.1);
      border-color: rgba(34,197,94,0.2);
      background: rgba(255,255,255,0.96);
    }

    /* ── Avatar ── */
    .member-avatar-wrap {
      position: relative;
      width: 84px; height: 84px;
      flex-shrink: 0;
      margin-bottom: 12px;
    }
    .member-avatar {
      width: 84px; height: 84px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 0 0 2px rgba(34,197,94,0.12);
      transition: transform 0.3s ease;
    }
    .member-card:hover .member-avatar {
      transform: scale(1.06);
    }
    .member-avatar img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .member-status-dot {
      position: absolute;
      bottom: 2px; right: 2px;
      width: 13px; height: 13px;
      border-radius: 50%;
      border: 2.5px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      z-index: 2;
    }
    .member-status-dot.online { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.15), 0 2px 6px rgba(0,0,0,0.1); }
    .member-status-dot.offline { background: #9ca3af; }

    /* ── Info ── */
    .member-name {
      font-size: 17px; font-weight: 700; color: #1a1a2e;
      margin: 0 0 2px; letter-spacing: -0.2px;
    }
    .member-meta {
      font-size: 13px; color: #6b7280; margin: 0 0 3px; font-weight: 500;
    }
    .member-status-text {
      font-size: 12px; font-weight: 600; margin: 0 0 10px;
    }
    .member-status-text.online { color: #16a34a; }
    .member-status-text.offline { color: #9ca3af; }
    .member-bio {
      font-size: 13px; color: #6b7280; margin: 0 0 10px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Tags ── */
    .member-tags {
      display: flex; flex-wrap: wrap; gap: 5px;
      justify-content: center; margin-bottom: 14px;
    }
    .member-tag {
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      background: #f0fdf4; color: #16a34a;
      border: 1px solid #bbf7d0;
      transition: all 0.2s;
    }
    .member-tag:hover { background: #dcfce7; }

    /* ── Button ── */
    .btn-message {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: -0.01em;
    }
    .btn-message:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(22,163,74,0.25);
    }
    .btn-message:active { transform: translateY(0) scale(0.98); }

    /* ── States ── */
    .loading {
      grid-column: 1/-1; text-align: center;
      padding: 60px 20px; color: #6b7280; font-size: 14px; font-weight: 500;
    }
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 60px 20px; color: #6b7280;
    }
    .empty-state span { font-size: 44px; display: block; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }
    .error-msg {
      grid-column: 1/-1; color: #dc2626; font-size: 13px;
      padding: 10px 14px; background: #fef2f2; border-radius: 10px;
      border: 1px solid #fecaca; text-align: center;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .page-container { padding: 20px 16px 40px; }
      .discover-hero h1 { font-size: 24px; }
      .discover-hero p { font-size: 14px; }
      .discover-hero { margin-bottom: 20px; }
      .filter-tabs { margin-bottom: 20px; gap: 4px; }
      .filter-tab { padding: 6px 14px; font-size: 12px; }
      .discover-section { margin-bottom: 28px; }
      .section-head h3 { font-size: 15px; }
      .members-grid { gap: 14px; grid-template-columns: 1fr; }
      .member-card { padding: 20px 16px 14px; }
      .member-avatar-wrap { width: 76px; height: 76px; }
      .member-avatar { width: 76px; height: 76px; }
      .member-name { font-size: 16px; }
    }
  </style>
</head>
<body>
  <!-- Hamburger Navbar -->
  <nav class="hamburger-nav">
    <button class="hamburger-btn" id="menuToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <a href="browse.html" class="hamburger-logo">✦ Spark</a>
    <a href="profile.html" class="hamburger-avatar" id="hamburgerAvatar">?</a>
  </nav>

  <!-- Overlay + Drawer -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-avatar" id="drawerAvatar">?</div>
      <div class="drawer-user-info">
        <span class="drawer-name" id="drawerName">...</span>
        <span class="drawer-status" id="drawerStatus">Offline</span>
      </div>
    </div>
    <div class="drawer-links">
      <a href="browse.html" class="drawer-link active"><span class="drawer-icon">👥</span> Discover</a>
      <a href="profile.html" class="drawer-link"><span class="drawer-icon">👤</span> Profile</a>
      <a href="chat.html" class="drawer-link"><span class="drawer-icon">💬</span> Messages</a>
    </div>
    <div class="drawer-footer">
      <a href="#" class="drawer-link drawer-logout" onclick="logout()"><span class="drawer-icon">🚪</span> Logout</a>
    </div>
  </div>

  <!-- Desktop navbar -->
  <nav class="navbar">
    <a href="browse.html" class="logo-small">✦ Spark</a>
    <div class="nav-links">
      <a href="browse.html" class="active">Discover</a>
      <a href="chat.html">Messages</a>
      <a href="profile.html">Profile</a>
      <div class="nav-user">
        <div class="nav-user-avatar-placeholder" id="navInitial">?</div>
        <span class="nav-user-name" id="navName">...</span>
      </div>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="page-container">

    <!-- ═══ Hero ═══ -->
    <div class="discover-hero">
      <h1>Discover people <span>✨</span></h1>
      <p>Find someone you'd like to connect with in Cebu.</p>
    </div>

    <!-- ═══ Filter Tabs ═══ -->
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all" onclick="filterMembers('all', this)">All</button>
      <button class="filter-tab" data-filter="active" onclick="filterMembers('active', this)">🟢 Active Now</button>
      <button class="filter-tab" data-filter="recent" onclick="filterMembers('recent', this)">⭐ Recently Joined</button>
    </div>

    <!-- ═══ Active Now ═══ -->
    <div class="discover-section" id="activeNowSection" style="display:none;">
      <div class="section-head">
        <h3>🟢 Active Now <span class="sub-label">Online now</span></h3>
        <a href="#" class="view-all" onclick="filterMembers('all', document.querySelector('[data-filter=all]'));return false;">View all →</a>
      </div>
      <div id="activeNowGrid" class="members-grid"></div>
    </div>

    <!-- ═══ All Members ═══ -->
    <div class="discover-section">
      <div class="section-head">
        <h3>👥 Everyone <span class="sub-label">All members</span></h3>
      </div>
      <div id="membersGrid" class="members-grid">
        <div class="loading">Loading members...</div>
      </div>
    </div>
  </div>

  <script>
    // ── Drawer menu ──
    (function(){
      const menuToggle = document.getElementById('menuToggle');
      const drawer = document.getElementById('drawer');
      const overlay = document.getElementById('drawerOverlay');
      if (menuToggle && drawer && overlay) {
        function openDrawer() {
          menuToggle.classList.add('open');
          drawer.classList.add('open');
          overlay.classList.add('open');
          document.body.classList.add('drawer-open');
        }
        function closeDrawer() {
          menuToggle.classList.remove('open');
          drawer.classList.remove('open');
          overlay.classList.remove('open');
          document.body.classList.remove('drawer-open');
        }
        menuToggle.addEventListener('click', () => {
          if (drawer.classList.contains('open')) closeDrawer();
          else openDrawer();
        });
        overlay.addEventListener('click', closeDrawer);
      }
    })();

    let allMembers = [];
  </script>
  <script>
    if (!localStorage.getItem('token')) window.location.href = 'index.html';
    const token = localStorage.getItem('token');
    const myId = parseInt(localStorage.getItem('userId'));

    const VIBE_TAGS = ['Tech', 'Coffee', 'Music', 'Fitness', 'Travel', 'Anime', 'Photography', 'Gaming'];

    window.loadMembers = async function loadMembers() {
      try {
        const res = await fetch('/api/members', { headers: { Authorization: `Bearer ${token}` } });
        allMembers = await res.json();
        const grid = document.getElementById('membersGrid');
        const activeGrid = document.getElementById('activeNowGrid');
        const activeSection = document.getElementById('activeNowSection');

        if (!allMembers.length) {
          grid.innerHTML = '<div class="empty-state"><span>👥</span><p>No other members yet.<br>Invite friends to join!</p></div>';
          return;
        }

        const activeMembers = allMembers.filter(m => m.online);
        if (activeMembers.length > 0) {
          activeSection.style.display = 'block';
          activeGrid.innerHTML = activeMembers.map(m => buildCard(m)).join('');
        }

        grid.innerHTML = allMembers.map(m => buildCard(m)).join('');
      } catch (e) {
        document.getElementById('membersGrid').innerHTML = '<div class="error-msg">Failed to load members.</div>';
      }
    }

    function buildCard(m) {
      const displayName = escapeHtml(m.name || m.username);
      const tags = [...VIBE_TAGS].sort(() => Math.random() - 0.5).slice(0, 3);
      const tagHtml = tags.map(t => `<span class="member-tag">${t}</span>`).join('');

      return `
        <div class="member-card" onclick="startChat(${m.id}, '${escapeHtml(m.name || m.username)}')">
          <div class="member-avatar-wrap" data-uid="${m.id}">
            <div class="member-avatar">
              <img src="${m.photo || ''}" alt="${displayName}"
                onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23dcfce7%22/><text y=%22.9em%22 font-size=%2260%22 x=%2210%22>👤</text></svg>'">
            </div>
            <span class="member-status-dot ${m.online ? 'online' : 'offline'}"></span>
          </div>
          <h3 class="member-name">${displayName}</h3>
          <p class="member-meta">${m.age ? m.age + ' · ' : ''}${escapeHtml(m.gender || '')}</p>
          <p class="member-status-text ${m.online ? 'online' : 'offline'}" data-uid="${m.id}">
            ${m.online ? 'Online' : (m.lastSeen ? 'Offline · ' + timeAgo(m.lastSeen) : 'Offline')}
          </p>
          <p class="member-bio">${escapeHtml(m.bio || 'No bio yet')}</p>
          <div class="member-tags">${tagHtml}</div>
          <button class="btn-message">Message</button>
        </div>
      `;
    }

    function filterMembers(filter, btn) {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      if (btn) btn.classList.add('active');

      const grid = document.getElementById('membersGrid');
      let filtered = allMembers;

      if (filter === 'active') {
        filtered = allMembers.filter(m => m.online);
      } else if (filter === 'recent') {
        filtered = [...allMembers].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 10);
      }

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state"><span>🔍</span><p>No members found.</p></div>';
        return;
      }
      grid.innerHTML = filtered.map(m => buildCard(m)).join('');
    }

    function startChat(userId, name) {
      window.location.href = `chat.html?with=${userId}&name=${encodeURIComponent(name)}`;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function timeAgo(iso) {
      if (!iso) return 'a while ago';
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days}d ago`;
      return new Date(iso).toLocaleDateString();
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    loadMembers();
  </script>
  <script src="nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="global.js"></script>
  <div class="page-footer">
    <a href="terms.html">Terms</a>
    <span style="color:var(--border);margin:0 8px;">|</span>
    <a href="privacy.html">Privacy</a>
    <span style="color:var(--border);margin:0 8px;">|</span>
    <a href="faq.html">FAQ</a>
  </div>
</body>
</html>

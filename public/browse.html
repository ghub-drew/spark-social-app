<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark - Discover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f0fdf4 0%, #f8fafc 40%, #f0fdf4 100%);
      min-height: 100vh; position: relative;
    }
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(34,197,94,0.08), transparent 70%);
      top: -200px; right: -200px;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(134,239,172,0.08), transparent 70%);
      bottom: -150px; left: -150px;
    }

    .page-container {
      max-width: 1100px; margin: 0 auto;
      padding: 28px 24px 60px; position: relative; z-index: 1;
    }

    /* ── Hero ── */
    .hero {
      margin-bottom: 24px;
    }
    .hero h1 {
      font-size: 28px; font-weight: 800; color: #1a1a2e;
      margin: 0 0 4px; letter-spacing: -0.5px;
    }
    .hero h1 span { color: #16a34a; }
    .hero p {
      font-size: 15px; color: #6b7280; margin: 0; font-weight: 400;
    }

    /* ── Search ── */
    .search-bar {
      display: flex; align-items: center; gap: 10px;
      background: white; border: 1px solid #e5e7eb;
      border-radius: 16px; padding: 10px 16px;
      margin-bottom: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      transition: all 0.2s;
    }
    .search-bar:focus-within {
      border-color: #22c55e; box-shadow: 0 0 0 4px rgba(34,197,94,0.08);
    }
    .search-bar input {
      flex: 1; border: none; outline: none;
      font-size: 14px; font-family: 'Inter', sans-serif;
      background: transparent; color: #374151;
    }
    .search-bar input::placeholder { color: #9ca3af; }
    .search-bar span { font-size: 16px; color: #9ca3af; }

    /* ── Filter Pills ── */
    .filter-pills {
      display: flex; gap: 6px; margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .filter-pill {
      padding: 7px 16px; border-radius: 24px;
      border: 1px solid #e5e7eb; background: white;
      font-size: 13px; font-weight: 600; color: #6b7280;
      cursor: pointer; transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }
    .filter-pill:hover { border-color: #bbf7d0; color: #16a34a; background: #f0fdf4; }
    .filter-pill.active { background: #16a34a; color: white; border-color: #16a34a; box-shadow: 0 2px 8px rgba(22,163,74,0.2); }

    /* ── Section ── */
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-head h3 {
      font-size: 16px; font-weight: 700; color: #1a1a2e; margin: 0;
      display: flex; align-items: center; gap: 8px;
    }
    .section-head .sub {
      font-size: 12px; color: #9ca3af; font-weight: 400;
    }
    .section-head .view-all {
      font-size: 13px; color: #16a34a; text-decoration: none;
      font-weight: 600; transition: color 0.2s;
    }
    .section-head .view-all:hover { color: #15803d; }
    .section-block { margin-bottom: 32px; }

    /* ── Grid ── */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
    }
    @media (min-width: 900px) {
      .members-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── Card ── */
    .member-card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(229,231,235,0.5);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      padding: 24px 18px 16px;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
    }
    .member-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 48px rgba(22,163,74,0.1);
      border-color: rgba(34,197,94,0.2);
      background: rgba(255,255,255,0.96);
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative; width: 84px; height: 84px;
      flex-shrink: 0; margin-bottom: 12px;
    }
    .avatar {
      width: 84px; height: 84px; border-radius: 50%; overflow: hidden;
      border: 3px solid white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 0 0 2px rgba(34,197,94,0.12);
      transition: transform 0.35s ease;
    }
    .member-card:hover .avatar { transform: scale(1.06); }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .status-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 13px; height: 13px; border-radius: 50%;
      border: 2.5px solid white; z-index: 2;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .status-dot.online { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.15), 0 2px 6px rgba(0,0,0,0.1); }
    .status-dot.offline { background: #9ca3af; }

    /* ── Info ── */
    .member-name {
      font-size: 17px; font-weight: 700; color: #1a1a2e;
      margin: 0 0 2px; letter-spacing: -0.2px;
    }
    .member-meta {
      font-size: 13px; color: #6b7280; margin: 0 0 3px; font-weight: 500;
    }
    .member-status {
      font-size: 12px; font-weight: 600; margin: 0 0 10px;
    }
    .member-status.online { color: #16a34a; }
    .member-status.offline { color: #9ca3af; }
    .member-status.new { color: #f59e0b; }
    .member-bio {
      font-size: 13px; color: #6b7280; margin: 0 0 10px;
      line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Tags ── */
    .member-tags {
      display: flex; flex-wrap: wrap; gap: 5px;
      justify-content: center; margin-bottom: 14px;
    }
    .member-tag {
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 20px; background: #f0fdf4; color: #16a34a;
      border: 1px solid #bbf7d0; transition: all 0.2s;
    }
    .member-tag:hover { background: #dcfce7; }

    /* ── Button ── */
    .btn-message {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-message:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(22,163,74,0.25);
    }
    .btn-message:active { transform: translateY(0) scale(0.97); }

    /* ── States ── */
    .loading {
      grid-column: 1/-1; text-align: center;
      padding: 60px 20px; color: #6b7280; font-size: 14px; font-weight: 500;
    }
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 60px 20px; color: #6b7280;
    }
    .empty-state span { font-size: 44px; display: block; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }
    .error-msg {
      grid-column: 1/-1; color: #dc2626; font-size: 13px;
      padding: 10px 14px; background: #fef2f2; border-radius: 10px;
      border: 1px solid #fecaca; text-align: center;
    }

    /* ── Tablet ── */
    @media (min-width: 641px) and (max-width: 1024px) {
      .page-container { padding: 28px 20px 60px; }
      .members-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
      .member-card { padding: 22px 16px 15px; }
      .avatar-wrap { width: 80px; height: 80px; }
      .avatar { width: 80px; height: 80px; }
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      body { overflow-x: hidden; }
      .page-container { padding: 20px 16px 40px; max-width: 100%; }
      .hero { margin-bottom: 18px; }
      .hero h1 { font-size: 22px; line-height: 1.3; }
      .hero p { font-size: 14px; line-height: 1.5; }

      .search-bar { padding: 8px 12px; border-radius: 14px; margin-bottom: 14px; }
      .search-bar input { font-size: 13px; }
      .search-bar span { font-size: 14px; }

      .filter-pills { gap: 5px; margin-bottom: 18px; }
      .filter-pill { padding: 7px 12px; font-size: 12px; }

      .section-block { margin-bottom: 24px; }
      .section-head { margin-bottom: 12px; }
      .section-head h3 { font-size: 15px; gap: 6px; }
      .section-head .sub { font-size: 11px; }
      .section-head .view-all { font-size: 12px; }

      .members-grid { gap: 14px; grid-template-columns: 1fr; }

      .member-card { padding: 20px 16px 14px; }
      .member-card:hover { transform: translateY(-3px); }

      .avatar-wrap { width: 76px; height: 76px; margin-bottom: 10px; }
      .avatar { width: 76px; height: 76px; border-width: 2.5px; }
      .status-dot { width: 12px; height: 12px; border-width: 2px; bottom: 1px; right: 1px; }

      .member-name { font-size: 16px; margin-bottom: 1px; }
      .member-meta { font-size: 12px; margin-bottom: 2px; }
      .member-status { font-size: 11px; margin-bottom: 8px; }
      .member-bio { font-size: 12px; margin-bottom: 8px; -webkit-line-clamp: 2; }

      .member-tags { gap: 4px; margin-bottom: 12px; }
      .member-tag { font-size: 10px; padding: 2px 8px; }

      .btn-message { padding: 9px; font-size: 13px; border-radius: 10px; }
      .btn-message:hover { transform: none; }
      .btn-message:active { transform: scale(0.97); }

      .loading { padding: 40px 16px; font-size: 13px; }
      .empty-state { padding: 40px 16px; }
      .empty-state span { font-size: 36px; }
      .empty-state p { font-size: 13px; }
      .error-msg { font-size: 12px; padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <nav class="hamburger-nav">
    <button class="hamburger-btn" id="menuToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <a href="browse.html" class="hamburger-logo">✦ Spark</a>
    <a href="profile.html" class="hamburger-avatar" id="hamburgerAvatar">?</a>
  </nav>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-avatar" id="drawerAvatar">?</div>
      <div class="drawer-user-info">
        <span class="drawer-name" id="drawerName">...</span>
        <span class="drawer-status" id="drawerStatus">Offline</span>
      </div>
    </div>
    <div class="drawer-links">
      <a href="browse.html" class="drawer-link active"><span class="drawer-icon">👥</span> Discover</a>
      <a href="profile.html" class="drawer-link"><span class="drawer-icon">👤</span> Profile</a>
      <a href="chat.html" class="drawer-link"><span class="drawer-icon">💬</span> Messages</a>
    </div>
    <div class="drawer-footer">
      <a href="#" class="drawer-link drawer-logout" onclick="logout()"><span class="drawer-icon">🚪</span> Logout</a>
    </div>
  </div>

  <nav class="navbar">
    <a href="browse.html" class="logo-small">✦ Spark</a>
    <div class="nav-links">
      <a href="browse.html" class="active">Discover</a>
      <a href="chat.html">Messages</a>
      <a href="profile.html">Profile</a>
      <div class="nav-user">
        <div class="nav-user-avatar-placeholder" id="navInitial">?</div>
        <span class="nav-user-name" id="navName">...</span>
      </div>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="page-container">

    <div class="hero">
      <h1>Discover people <span>✨</span></h1>
      <p>Find someone you'd like to connect with in Cebu.</p>
    </div>

    <!-- ═══ Search ═══ -->
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Search people, vibes, or interests..." oninput="filterMembers(currentFilter, document.querySelector('.filter-pill.active'))">
    </div>

    <!-- ═══ Filter Pills ═══ -->
    <div class="filter-pills">
      <button class="filter-pill active" data-filter="all" onclick="filterMembers('all', this)">All</button>
      <button class="filter-pill" data-filter="active" onclick="filterMembers('active', this)">🟢 Active Now</button>
      <button class="filter-pill" data-filter="nearby" onclick="filterMembers('nearby', this)">📍 Nearby</button>
      <button class="filter-pill" data-filter="recent" onclick="filterMembers('recent', this)">⭐ Recently Joined</button>
    </div>

    <!-- ═══ Active Now Section ═══ -->
    <div class="section-block" id="activeNowSection" style="display:none;">
      <div class="section-head">
        <h3>🟢 Active Now <span class="sub">Online now</span></h3>
        <a href="#" class="view-all" onclick="filterMembers('all', document.querySelector('[data-filter=all]'));return false;">View all →</a>
      </div>
      <div id="activeNowGrid" class="members-grid"></div>
    </div>

    <!-- ═══ Everyone ═══ -->
    <div class="section-block">
      <div class="section-head">
        <h3>👥 Everyone <span class="sub">All members</span></h3>
      </div>
      <div id="membersGrid" class="members-grid">
        <div class="loading">Loading members...</div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const t=document.getElementById('menuToggle'),d=document.getElementById('drawer'),o=document.getElementById('drawerOverlay');
      if(t&&d&&o){function a(){t.classList.add('open');d.classList.add('open');o.classList.add('open');document.body.classList.add('drawer-open');}
      function b(){t.classList.remove('open');d.classList.remove('open');o.classList.remove('open');document.body.classList.remove('drawer-open');}
      t.addEventListener('click',()=>{d.classList.contains('open')?b():a();});o.addEventListener('click',b);}
    })();

    let allMembers = [];
    let currentFilter = 'all';
  </script>
  <script>
    if (!localStorage.getItem('token')) window.location.href = 'index.html';
    const token = localStorage.getItem('token');

    const TAGS = ['Tech', 'Coffee', 'Music', 'Travel', 'Anime', 'Fitness', 'Photography', 'Gaming', 'Books'];

    function humanStatus(m) {
      if (m.online) return 'Active now';
      if (!m.lastSeen) return 'New here';
      const diff = Date.now() - new Date(m.lastSeen).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 5) return 'Active now';
      if (mins < 60) return 'Recently active';
      if (mins < 1440) return 'Active today';
      const days = Math.floor(mins / 1440);
      if (days < 7) return `Active ${days}d ago`;
      return 'Recently active';
    }

    function statusClass(m) {
      if (m.online) return 'online';
      if (!m.lastSeen) return 'new';
      return 'offline';
    }

    window.loadMembers = async function loadMembers() {
      try {
        const res = await fetch('/api/members', { headers: { Authorization: `Bearer ${token}` } });
        allMembers = await res.json();
        const grid = document.getElementById('membersGrid');
        const activeGrid = document.getElementById('activeNowGrid');
        const activeSection = document.getElementById('activeNowSection');

        if (!allMembers.length) {
          grid.innerHTML = '<div class="empty-state"><span>👥</span><p>No other members yet.<br>Invite friends to join!</p></div>';
          return;
        }

        const active = allMembers.filter(m => m.online);
        if (active.length > 0) {
          activeSection.style.display = 'block';
          activeGrid.innerHTML = active.map(m => card(m)).join('');
        }

        grid.innerHTML = allMembers.map(m => card(m)).join('');
      } catch (e) {
        document.getElementById('membersGrid').innerHTML = '<div class="error-msg">Failed to load members.</div>';
      }
    }

    function card(m) {
      const name = esc(m.name || m.username);
      const tags = [...TAGS].sort(() => Math.random() - 0.5).slice(0, 3).map(t => `<span class="member-tag">${t}</span>`).join('');
      const status = humanStatus(m);
      const sClass = statusClass(m);

      return `
        <div class="member-card" onclick="startChat(${m.id}, '${esc(m.name || m.username)}')">
          <div class="avatar-wrap" data-uid="${m.id}">
            <div class="avatar">
              <img src="${m.photo || ''}" alt="${name}"
                onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23dcfce7%22/><text y=%22.9em%22 font-size=%2260%22 x=%2210%22>👤</text></svg>'">
            </div>
            <span class="status-dot ${m.online ? 'online' : 'offline'}"></span>
          </div>
          <h3 class="member-name">${name}</h3>
          <p class="member-meta">${m.age ? m.age + ' · ' : ''}${esc(m.gender || '')}</p>
          <p class="member-status ${sClass}" data-uid="${m.id}">${status}</p>
          <p class="member-bio">${esc(m.bio || 'No bio yet')}</p>
          <div class="member-tags">${tags}</div>
          <button class="btn-message">Message</button>
        </div>
      `;
    }

    function filterMembers(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-pill').forEach(t => t.classList.remove('active'));
      if (btn) btn.classList.add('active');

      const grid = document.getElementById('membersGrid');
      const q = (document.getElementById('searchInput').value || '').toLowerCase();
      let filtered = allMembers;

      if (filter === 'active') filtered = allMembers.filter(m => m.online);
      else if (filter === 'recent') filtered = [...allMembers].sort((a,b) => new Date(b.created_at)-new Date(a.created_at)).slice(0,10);
      else if (filter === 'nearby') filtered = allMembers;

      if (q) filtered = filtered.filter(m => (m.name||'').toLowerCase().includes(q) || (m.bio||'').toLowerCase().includes(q) || (m.username||'').toLowerCase().includes(q) || (m.gender||'').toLowerCase().includes(q));

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state"><span>🔍</span><p>No members found.</p></div>';
        return;
      }
      grid.innerHTML = filtered.map(m => card(m)).join('');
    }

    function startChat(id, name) { window.location.href = `chat.html?with=${id}&name=${encodeURIComponent(name)}`; }
    function esc(s) { if(!s)return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function timeAgo(iso) { if(!iso)return ''; const d=Date.now()-new Date(iso).getTime(); const m=Math.floor(d/60000); if(m<1)return 'just now'; if(m<60)return m+'m ago'; const h=Math.floor(m/60); if(h<24)return h+'h ago'; const days=Math.floor(h/24); if(days<7)return days+'d ago'; return new Date(iso).toLocaleDateString(); }
    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    loadMembers();
  </script>
  <script src="nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="global.js"></script>
  <div class="page-footer">
    <a href="terms.html">Terms</a> <span style="color:var(--border);margin:0 8px;">|</span>
    <a href="privacy.html">Privacy</a> <span style="color:var(--border);margin:0 8px;">|</span>
    <a href="faq.html">FAQ</a>
  </div>
</body>
</html>

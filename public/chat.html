<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark - Chat</title>
  <link rel="icon" type="image/svg+xml" href="/spark-icon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Soft mint chat background ── */
    body {
      background: #F6FBF8;
    }

    /* ── Subtle green ambient accents ── */
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(34,197,94,0.04), transparent 70%);
      top: -150px; left: -100px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(134,239,172,0.04), transparent 70%);
      bottom: -100px; right: -100px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Chat layout panels ── */
    .chat-layout {
      position: relative;
      z-index: 1;
      gap: 0;
      background: transparent;
      overflow: hidden;
      height: calc(100vh - 60px);
      height: calc(100dvh - 60px);
    }

    .chat-sidebar {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-right: 1px solid rgba(229,231,235,0.5);
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid rgba(229,231,235,0.4);
    }
    .sidebar-header h3 { font-size: 18px; font-weight: 800; color: #1a1a2e; }

    .new-chat-btn {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 18px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .new-chat-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 12px rgba(22,163,74,0.3);
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      scroll-behavior: smooth;
    }

    /* ── Fade gradient hint at bottom of collapsed list ── */
    .convo-fade {
      position: sticky;
      bottom: 0;
      height: 40px;
      margin-top: -40px;
      background: linear-gradient(to bottom, transparent, rgba(246,251,248,0.95));
      pointer-events: none;
      z-index: 2;
    }

    /* ── Extra conversations wrapper (hidden by default) ── */
    .convo-extra {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s ease;
    }
    .convo-extra.open {
      max-height: 1000px;
    }

    /* ── Expand/collapse toggle button ── */
    .convo-toggle-wrap {
      display: flex;
      justify-content: center;
      padding: 4px 0 8px;
    }
    .convo-more-toggle {
      display: flex; align-items: center; justify-content: center; gap: 4px;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(22,163,74,0.08);
      border: none;
      font-size: 13px; font-weight: 700; color: #16a34a;
      cursor: pointer; transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      min-width: 44px;
    }
    .convo-more-toggle:hover {
      background: rgba(22,163,74,0.16);
      transform: scale(1.04);
    }
    .convo-more-toggle:active {
      transform: scale(0.96);
    }
    .convo-more-toggle .plus-sign {
      font-size: 15px;
      font-weight: 800;
    }
    .convo-more-toggle .collapse-icon {
      font-size: 14px;
      line-height: 1;
    }

    /* ── Slide-in animation for extra items ── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .convo-item.extra-item {
      animation: slideDown 0.3s ease-out;
    }

    .convo-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 0;
      margin: 0;
      position: relative;
    }
    .convo-item:hover {
      background: rgba(240,253,244,0.6);
      padding-left: 20px;
    }
    .convo-item.active {
      background: rgba(240,253,244,0.9);
    }
    .convo-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      background: #16a34a;
      border-radius: 0 4px 4px 0;
    }
    .convo-item img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }

    .convo-info { flex: 1; min-width: 0; }
    .convo-info .name { font-size: 14px; font-weight: 700; color: #1a1a2e; }
    .convo-info .preview {
      font-size: 12px; color: #6b7280;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .convo-unread-preview { font-weight: 700; color: #1a1a2e; }

    .convo-time { font-size: 11px; color: #9ca3af; flex-shrink: 0; }

    .unread-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 20px; height: 20px; border-radius: 10px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
      box-shadow: 0 2px 6px rgba(22,163,74,0.3);
      z-index: 3;
      pointer-events: none;
      border: 2px solid white;
      line-height: 1;
    }

    /* ── Chat main panel ── */
    .chat-main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden;
      background: transparent;
    }

    .chat-placeholder {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #6b7280;
    }
    .chat-placeholder span { font-size: 56px; margin-bottom: 16px; }
    .chat-placeholder p { text-align: center; line-height: 1.8; font-size: 15px; }
    .chat-placeholder a { color: #16a34a; text-decoration: none; font-weight: 600; }
    .chat-placeholder a:hover { text-decoration: underline; }

    .chat-window {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .chat-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(229,231,235,0.3);
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .chat-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .chat-header h3 { font-size: 16px; font-weight: 700; color: #1a1a2e; }

    .convo-avatar-wrap { position: relative; flex-shrink: 0; }

    .chat-partner-status { font-size: 12px; font-weight: 600; margin-top: 1px; }
    .chat-partner-status.is-online  { color: #16a34a; }
    .chat-partner-status.is-offline { color: #9ca3af; }

    /* ── Messages area ── */
    .messages-area {
      flex: 1; overflow-y: auto; padding: 28px 24px;
      display: flex; flex-direction: column; gap: 10px;
      background: transparent;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    @keyframes msgFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message {
      display: flex; flex-direction: row; max-width: 72%; align-items: flex-end; gap: 0;
      animation: msgFadeIn 0.25s ease-out;
    }
    .message .bubble-wrap { display: flex; flex-direction: column; }
    .message.mine  { align-self: flex-end;   flex-direction: row-reverse; }
    .message.theirs { align-self: flex-start; flex-direction: row; }
    .message.mine  .bubble-wrap { align-items: flex-end; }
    .message.theirs .bubble-wrap { align-items: flex-start; }

    .mine .bubble {
      background: #DFF7E6;
      color: #0F172A;
      border-radius: 20px 20px 4px 20px;
      padding: 12px 18px;
      font-size: 14px; line-height: 1.5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: background 0.15s ease;
    }
    .mine .bubble:hover {
      background: #C6F0D6;
    }
    .theirs .bubble {
      background: white;
      color: #0F172A;
      border-radius: 20px 20px 20px 4px;
      padding: 12px 18px;
      font-size: 14px; line-height: 1.5;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 1px 4px rgba(0,0,0,0.02);
    }

    /* ── Message input area ── */
    .message-input-area {
      display: flex; align-items: center; gap: 0;
      padding: 6px 16px 14px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      background: transparent;
      border-top: none;
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex; align-items: center; gap: 0;
      flex: 1; min-width: 0;
      background: white;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 18px;
      padding: 4px 6px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .input-wrapper:focus-within {
      border-color: #22C55E;
      box-shadow: 0 2px 16px rgba(34,197,94,0.08);
    }
    .input-wrapper textarea {
      flex: 1; min-width: 0;
      border: none;
      background: transparent;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      resize: none;
      overflow-y: auto;
      min-height: 44px;
      max-height: 130px;
      padding: 10px 8px;
      line-height: 1.4;
      align-self: center;
      box-sizing: border-box;
    }
    .input-wrapper textarea::placeholder {
      color: #9ca3af;
    }
    .input-wrapper textarea::-webkit-scrollbar {
      width: 4px;
    }
    .input-wrapper textarea::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .btn-emoji, .btn-attach {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: transparent;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
      color: #606770;
      padding: 0;
    }
    .btn-emoji svg, .btn-attach svg {
      display: block;
    }
    .btn-emoji:hover, .btn-attach:hover {
      background: #f0f0f0;
    }

    .btn-send {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    .btn-send:focus {
      outline: none;
    }
    .btn-send svg {
      display: block;
    }
    .btn-send svg path {
      fill: #22C55E;
    }
    .btn-send:hover {
      transform: scale(1.1);
    }
    .btn-send:active {
      transform: scale(0.9);
    }



    /* ── File preview bar ── */
    .file-preview-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px;
      background: #DFF7E6;
      border-top: 1px solid rgba(34,197,94,0.1);
    }
    .file-preview-cancel:hover { background: #fef2f2; color: #ef4444; }

    /* ── Emoji picker ── */
    .emoji-picker {
      display: none;
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 8px;
    }
    .emoji-picker.open { display: block; }

    .emoji-tabs { display: flex; gap: 4px; margin-bottom: 6px; }
    .emoji-tab {
      flex: 1; padding: 6px; border: none; background: transparent;
      border-radius: 8px; cursor: pointer; font-size: 18px;
      transition: background 0.2s;
    }
    .emoji-tab:hover { background: #f3f4f6; }
    .emoji-tab.active { background: #f0fdf4; }

    .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; max-height: 200px; overflow-y: auto; }
    .emoji-grid button {
      background: none; border: none; font-size: 24px; padding: 4px;
      cursor: pointer; border-radius: 6px; transition: background 0.15s;
    }
    .emoji-grid button:hover { background: #f3f4f6; }

    /* ── Message actions (edit/delete) ── */
    .msg-actions { display: none; gap: 4px; align-items: center; }
    .message.mine:hover  .msg-actions,
    .message.theirs:hover .msg-actions { display: flex; }
    .msg-actions button {
      background: none; border: 1px solid #e5e7eb;
      border-radius: 6px; padding: 4px 8px;
      font-size: 11px; cursor: pointer; color: #6b7280;
      transition: all 0.15s;
    }
    .msg-actions button:hover { background: #f0fdf4; border-color: #16a34a; color: #16a34a; }

    /* ── Emoji-only messages ── */
    .message.emoji-only .bubble {
      background: transparent !important;
      font-size: 42px;
      line-height: 1;
      padding: 14px 18px;
      box-shadow: none !important;
      border: none !important;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .message.emoji-only.mine .bubble {
      background: transparent !important;
    }
    .message.emoji-only.mine .bubble:hover {
      background: transparent !important;
    }

    .message-time {
      font-size: 10px; color: #9ca3af;
      margin-top: 4px;
      opacity: 0.8;
    }
    .mine .message-time  { text-align: right; padding-right: 4px; }
    .theirs .message-time { text-align: left; padding-left: 4px; }

    .edited-tag { font-size: 10px; color: #9ca3af; margin-left: 4px; font-style: italic; }

    .mine .chat-file { background: rgba(34,197,94,0.08); border-radius: 10px; padding: 8px 12px; margin-top: 4px; }
    .theirs .chat-file { background: #f3f4f6; border-radius: 10px; padding: 8px 12px; margin-top: 4px; }

    .no-convos {
      text-align: center; padding: 40px 20px;
      color: #6b7280; font-size: 14px; line-height: 1.8;
    }
    .no-convos a { color: #16a34a; text-decoration: none; font-weight: 600; }

    .no-msgs {
      text-align: center; padding: 60px 20px;
      color: #6b7280; font-size: 14px; line-height: 1.7;
    }
    .no-msgs .icon { font-size: 42px; display: block; margin-bottom: 10px; }
    .no-msgs .title { font-size: 16px; font-weight: 700; color: #374151; margin-bottom: 4px; }
    .no-msgs .desc { font-size: 13px; color: #9ca3af; }

    .loading {
      text-align: center; padding: 40px 20px;
      color: #6b7280; font-size: 14px;
    }

    /* ── Status dot inside chat ── */
    .convo-avatar-wrap .status-dot {
      position: absolute; bottom: 0; right: 0;
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .convo-avatar-wrap .status-dot.online {
      box-shadow: 0 0 0 2px rgba(34,197,94,0.2);
    }
    @keyframes onlinePulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(34,197,94,0.2); }
      50%      { box-shadow: 0 0 0 4px rgba(34,197,94,0.1); }
    }
    .convo-avatar-wrap .status-dot.online {
      animation: onlinePulse 2s ease-in-out infinite;
    }

    /* ── Footer ── */
    .page-footer {
      background: rgba(255,255,255,0.6);
      position: relative;
      z-index: 1;
    }

    /* ── Mobile responsive ── */
    @media (max-width: 640px) {
      .message-input-area {
        padding: 4px 4px 10px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      }
      .input-wrapper {
        padding: 2px 4px;
        border-radius: 14px;
      }
      .input-wrapper textarea {
        font-size: 15px;
        min-height: 44px;
        max-height: 110px;
        padding: 8px;
      }
      .btn-send {
        width: 34px;
        height: 34px;
      }
      .btn-send svg {
        width: 18px;
        height: 18px;
      }
      .btn-emoji, .btn-attach {
        width: 32px;
        height: 32px;
      }
      .btn-emoji svg, .btn-attach svg {
        width: 17px;
        height: 17px;
      }
      .messages-area {
        padding: 8px 6px;
        gap: 6px;
      }
      .message {
        max-width: 95%;
      }
      .mine .bubble, .theirs .bubble {
        padding: 10px 14px;
        font-size: 14px;
      }
      .chat-header {
        padding: 8px 10px;
        gap: 10px;
      }
      .chat-header img {
        width: 34px;
        height: 34px;
      }
      .chat-header h3 {
        font-size: 15px;
      }
      .message.emoji-only .bubble {
        font-size: 36px;
        padding: 10px 14px;
      }
      /* Reduce conversation list padding on mobile for more space */
      .convo-item {
        padding: 10px 8px;
      }
      .convo-item img {
        width: 36px;
        height: 36px;
      }
      .emoji-grid {
        grid-template-columns: repeat(7, 1fr);
      }
      .file-preview-bar {
        padding: 8px 12px;
      }
    }

    /* ── Unread badge on drawer Messages link ── */
    .drawer-msg-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; border-radius: 9px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 10px; font-weight: 800;
      padding: 0 4px;
      margin-left: auto;
      box-shadow: 0 2px 6px rgba(22,163,74,0.3);
      line-height: 1;
      flex-shrink: 0;
    }

    /* ── Unread badge on desktop navbar Messages link ── */
    .nav-msg-badge {
      position: absolute;
      top: -4px;
      right: -6px;
      min-width: 18px; height: 18px; border-radius: 9px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
      box-shadow: 0 2px 6px rgba(22,163,74,0.3);
      line-height: 1;
      pointer-events: none;
    }

    /* ── Conversation reorder transition ── */
    .conversation-list {
      transition: opacity 0.2s ease;
    }

  </style>
</head>
<body>
  <!-- Hamburger Navbar -->
  <nav class="hamburger-nav">
    <button class="hamburger-btn" id="menuToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <a href="/discover" class="hamburger-logo">✦ Spark</a>
    <a href="/profile" class="hamburger-avatar" id="hamburgerAvatar">?</a>
  </nav>

  <!-- Overlay + Drawer -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-avatar" id="drawerAvatar">?</div>
      <div class="drawer-user-info">
        <span class="drawer-name" id="drawerName">...</span>
        <span class="drawer-status" id="drawerStatus">Offline</span>
      </div>
    </div>
    <div class="drawer-links">
      <a href="/discover" class="drawer-link"><span class="drawer-icon">👥</span> Discover</a>
      <a href="/profile" class="drawer-link"><span class="drawer-icon">👤</span> Profile</a>
      <a href="/messages" class="drawer-link active"><span class="drawer-icon">💬</span> Messages</a>
    </div>
    <div class="drawer-footer">
      <a href="#" class="drawer-link drawer-logout" onclick="logout()"><span class="drawer-icon">🚪</span> Logout</a>
    </div>
  </div>

  <!-- Desktop navbar -->
  <nav class="navbar">
    <a href="/discover" class="logo-small">✦ Spark</a>
    <div class="nav-links">
      <a href="/discover">Discover</a>
      <a href="/messages" class="active">Messages</a>
      <a href="/profile">Profile</a>
      <div class="nav-user">
        <div class="nav-user-avatar-placeholder" id="navInitial">?</div>
        <span class="nav-user-name" id="navName">...</span>
      </div>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="chat-layout">
    <!-- Sidebar -->
    <div class="chat-sidebar">
      <div class="sidebar-header">
        <h3>Chat</h3>
        <a href="/discover" class="new-chat-btn" title="New chat">+</a>
      </div>
      <div id="conversationList" class="conversation-list">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-main">
      <div id="chatPlaceholder" class="chat-placeholder">
        <span>💬</span>
        <p>Select a conversation or<br><a href="/discover">browse members</a> to start chatting</p>
      </div>

      <div id="chatWindow" class="chat-window hidden">
        <div class="chat-header">
          <div class="convo-avatar-wrap">
            <img id="chatPartnerPhoto" src="" alt=""
              onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect width=%2240%22 height=%2240%22 fill=%22%23dcfce7%22/><text y=%22.9em%22 font-size=%2224%22 x=%224%22>👤</text></svg>'">
            <span class="status-dot offline" id="chatPartnerDot"></span>
          </div>
          <div>
            <h3 id="chatPartnerName"></h3>
            <p class="chat-partner-status is-offline" id="chatPartnerStatus">Offline</p>
          </div>
        </div>

        <div id="messages" class="messages-area"></div>

        <div class="emoji-picker" id="emojiPicker">
          <div class="emoji-tabs">
            <button class="emoji-tab active" onclick="showEmojiCat(event,'smileys')">😀</button>
            <button class="emoji-tab" onclick="showEmojiCat(event,'hearts')">❤️</button>
            <button class="emoji-tab" onclick="showEmojiCat(event,'hands')">👋</button>
            <button class="emoji-tab" onclick="showEmojiCat(event,'nature')">🌸</button>
            <button class="emoji-tab" onclick="showEmojiCat(event,'food')">🍕</button>
            <button class="emoji-tab" onclick="showEmojiCat(event,'activity')">⚽</button>
            <button class="emoji-tab" onclick="showEmojiCat(event,'symbols')">✨</button>
          </div>
          <div class="emoji-grid" id="emojiGrid"></div>
        </div>

        <div id="filePreviewBar" class="file-preview-bar hidden">
          <div id="filePreviewContent"></div>
          <button type="button" class="file-preview-cancel" onclick="cancelFile()" title="Cancel">✕</button>
        </div>

        <form class="message-input-area" onsubmit="sendMessage(event)">
          <div class="input-wrapper">
            <button type="button" class="btn-emoji" id="emojiToggle" onclick="toggleEmoji()" title="Emoji">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 11.5C6.5 11.5 7.75 13.5 10 13.5C12.25 13.5 13.5 11.5 13.5 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="7" cy="7.5" r=".8" fill="currentColor"/><circle cx="13" cy="7.5" r=".8" fill="currentColor"/></svg>
            </button>
            <button type="button" class="btn-attach" id="attachBtn" onclick="document.getElementById('fileInput').click()" title="Attach photo">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="2" y="3" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/><circle cx="7" cy="8" r="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M2 13L6 9L10 13L14 9L18 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <input type="file" id="fileInput" hidden onchange="handleFileSelect(event)">
            <textarea id="messageInput" placeholder="Type a message..." rows="1" maxlength="500"></textarea>
            <button type="submit" class="btn-send">
              <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="global.js"></script>
  <script>
    // ── Drawer menu ──────────────────────────────────────────────
    const menuToggle = document.getElementById('menuToggle');
    const drawer = document.getElementById('drawer');
    const overlay = document.getElementById('drawerOverlay');
    if (menuToggle && drawer && overlay) {
      function openDrawer() {
        menuToggle.classList.add('open');
        drawer.classList.add('open');
        overlay.classList.add('open');
        document.body.classList.add('drawer-open');
      }
      function closeDrawer() {
        menuToggle.classList.remove('open');
        drawer.classList.remove('open');
        overlay.classList.remove('open');
        document.body.classList.remove('drawer-open');
      }
      menuToggle.addEventListener('click', () => {
        if (drawer.classList.contains('open')) closeDrawer();
        else openDrawer();
      });
      overlay.addEventListener('click', closeDrawer);
    }
  </script>
  <script>
    if (!localStorage.getItem('token')) window.location.href = '/';

    const token = localStorage.getItem('token');
    const myId = parseInt(localStorage.getItem('userId'));
    let currentPartnerId = null;

    // Load persisted unread counts
    let unreadCounts = {};
    try {
      const saved = localStorage.getItem('spark_unread');
      if (saved) unreadCounts = JSON.parse(saved);
    } catch (_) {}

    // Persist unread counts to localStorage
    function saveUnreadCounts() {
      try { localStorage.setItem('spark_unread', JSON.stringify(unreadCounts)); } catch (_) {}
    }

    const sentMessageIds = new Set();

    const supabaseUrl = 'https://hpezaqvtufrvvczyixwc.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwZXphcXZ0dWZydnZjenlpeHdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDk5MTksImV4cCI6MjA5MzcyNTkxOX0.WzUQH4ZGn33Omv02m0ZtQgdYCXihGnHsOuhJmwGPXXI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

    // ── Polling fallback (runs alongside Supabase Realtime) ─────
    // Used when Supabase Realtime is slow or unavailable (e.g. on Vercel without Realtime config)
    let lastPollTime = Date.now();
    let pollInterval = null;
    let pollingEnabled = true;

    // Track last known message time per partner for polling detection
    const lastKnownMsgTime = {};

    function startPolling() {
      if (pollInterval) return;
      let lastPresencePoll = 0;
      pollInterval = setInterval(async () => {
        if (!pollingEnabled) return;
        if (document.hidden) return;

        try {
          const convosRes = await fetch('/api/conversations', {
            headers: { Authorization: `Bearer ${token}` }
          });
          const convos = await convosRes.json();
          if (!convos.length) return;

          // ── Update current chat partner presence (every 30s) ──
          const now = Date.now();
          if (currentPartnerId && (now - lastPresencePoll > 30_000)) {
            lastPresencePoll = now;
            const partnerConvo = convos.find(c => c.id === currentPartnerId);
            if (partnerConvo) {
              updateChatStatus(partnerConvo.online, partnerConvo.lastSeen);
            }
          }

          let needsConversationsRefresh = false;

          // Check each conversation for new messages
          for (const convo of convos) {
            const partnerId = convo.id;
            const msgTime = convo.last_message_time;
            if (!msgTime) continue;

            const prevTime = lastKnownMsgTime[partnerId];
            lastKnownMsgTime[partnerId] = msgTime;

            if (!prevTime) continue; // First time seeing this convo

            const isNewer = new Date(msgTime).getTime() > new Date(prevTime).getTime();
            if (!isNewer) continue;

            // New message detected in this conversation
            if (partnerId === currentPartnerId) {
              // Active chat — fetch and append new messages
              const area = document.getElementById('messages');
              if (area) {
                try {
                  const msgsRes = await fetch(`/api/messages/${partnerId}`, {
                    headers: { Authorization: `Bearer ${token}` }
                  });
                  const msgs = await msgsRes.json();
                  const existingIds = new Set();
                  area.querySelectorAll('.message[data-msg-id]').forEach(el => {
                    existingIds.add(parseInt(el.dataset.msgId));
                  });
                  let appended = 0;
                  for (const msg of msgs) {
                    if (!existingIds.has(msg.id)) {
                      if (sentMessageIds.has(msg.id)) {
                        sentMessageIds.delete(msg.id);
                        continue;
                      }
                      appendMessage(msg);
                      appended++;
                    }
                  }
                  if (appended > 0) needsConversationsRefresh = true;
                } catch (_) {}
              }
            } else {
              // Non-active conversation — increment unread count
              unreadCounts[partnerId] = (unreadCounts[partnerId] || 0) + 1;
              saveUnreadCounts();
              updateNavBadge();
              needsConversationsRefresh = true;
            }
          }

          if (needsConversationsRefresh) {
            loadConversations();
          } else {
            // Still refresh the list periodically for sorting accuracy
            const now = Date.now();
            if (now - lastPollTime > 8000) {
              loadConversations();
              lastPollTime = now;
            }
          }
        } catch (_) {}
      }, 3000);
    }

    // Stop polling when page is hidden, restart when visible
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        pollingEnabled = false;
      } else {
        pollingEnabled = true;
        lastPollTime = 0; // Force a poll on next interval
      }
    });

    // Start polling after a short delay (give Realtime a chance to connect first)
    setTimeout(startPolling, 2000);

    // ── Shared real-time message handler (called by Supabase Realtime) ──
    function handleIncomingMessage(msg) {
      // Only process if we're sender or receiver
      if (msg.sender_id !== myId && msg.receiver_id !== myId) return;
      // Skip if we sent it (already handled by sendMessage response)
      if (sentMessageIds.has(msg.id)) {
        sentMessageIds.delete(msg.id);
        return;
      }
      // Skip if already in DOM (polling may have added it first)
      if (document.querySelector(`.message[data-msg-id="${msg.id}"]`)) return;
      const isActiveChat =
        (msg.sender_id === currentPartnerId && msg.receiver_id === myId) ||
        (msg.sender_id === myId && msg.receiver_id === currentPartnerId);
      if (isActiveChat) {
        // Fetch with sender name if needed, then append
        if (msg.sender_name) {
          appendMessage(msg);
        } else {
          fetch(`/api/messages/${currentPartnerId}`, { headers: { Authorization: `Bearer ${token}` } })
            .then(r => r.json())
            .then(msgs => {
              const latest = msgs[msgs.length - 1];
              if (latest && latest.id === msg.id) appendMessage(latest);
            });
        }
      } else if (msg.sender_id !== myId) {
        unreadCounts[msg.sender_id] = (unreadCounts[msg.sender_id] || 0) + 1;
        saveUnreadCounts();
        updateNavBadge();
        // Fetch sender name for notification
        fetch('/api/members', { headers: { Authorization: `Bearer ${token}` } })
          .then(r => r.json())
          .then(members => {
            const sender = members.find(m => m.id === msg.sender_id);
            if (typeof window.showMessageNotification === 'function') {
              window.showMessageNotification({ ...msg, sender_name: sender?.name || sender?.username || 'Someone' });
            }
          });
      }
      loadConversations();
    }

    // ── Supabase Realtime subscription (fallback real-time) ──
    try {
      _supabase.channel('messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
        handleIncomingMessage(payload.new);
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages' }, payload => {
        const { id, content, edited } = payload.new;
        const div = document.querySelector(`.message[data-msg-id="${id}"]`);
        if (!div) return;
        div.dataset.msgContent = content;
        div.querySelector('.bubble').innerHTML = escapeHtml(content);
        const time = div.querySelector('.msg-time');
        if (edited && time && !time.querySelector('.edited-tag')) {
          time.insertAdjacentHTML('beforeend', '<span class="edited-tag">(edited)</span>');
        }
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, payload => {
        const { id } = payload.old;
        const div = document.querySelector(`.message[data-msg-id="${id}"]`);
        if (div) div.remove();
      })
      .subscribe((status) => {
        if (status !== 'SUBSCRIBED') console.warn('Supabase Realtime status:', status);
      });
    } catch (e) {
      console.error('Supabase Realtime setup failed:', e);
    }

    // Stop title flash when user focuses the chat window
    window.addEventListener('focus', () => {
      if (typeof window.stopTitleFlash === 'function') window.stopTitleFlash();
    });

    function updateChatStatus(online, lastSeen) {
      const dot = document.getElementById('chatPartnerDot');
      const statusEl = document.getElementById('chatPartnerStatus');
      if (!dot || !statusEl) return;
      if (online) {
        dot.className = 'status-dot online';
        statusEl.textContent = 'Online';
        statusEl.className = 'chat-partner-status is-online';
      } else {
        dot.className = 'status-dot offline';
        statusEl.textContent = lastSeen ? 'Offline · ' + timeAgo(lastSeen) : 'Offline';
        statusEl.className = 'chat-partner-status is-offline';
      }
    }

    function updateNavBadge() {
      const total = Object.values(unreadCounts).reduce((a, b) => a + b, 0);
      // Desktop navbar badge
      let badge = document.getElementById('navMsgBadge');
      const link = document.querySelector('.nav-links a[href="/messages"]');
      if (link) {
        if (total > 0) {
          if (!badge) {
            badge = document.createElement('span');
            badge.id = 'navMsgBadge';
            badge.className = 'nav-msg-badge';
            link.style.position = 'relative';
            link.appendChild(badge);
          }
          badge.textContent = total > 99 ? '99+' : total;
        } else if (badge) {
          badge.remove();
        }
      }
      // Mobile drawer badge
      const drawerLink = document.querySelector('.drawer-link[href="/messages"]');
      let drawerBadge = document.getElementById('drawerMsgBadge');
      if (drawerLink) {
        if (total > 0) {
          if (!drawerBadge) {
            drawerBadge = document.createElement('span');
            drawerBadge.id = 'drawerMsgBadge';
            drawerBadge.className = 'drawer-msg-badge';
            drawerLink.style.display = 'flex';
            drawerLink.appendChild(drawerBadge);
          }
          drawerBadge.textContent = total > 99 ? '99+' : total;
        } else if (drawerBadge) {
          drawerBadge.remove();
        }
      }
    }

    function timeAgo(iso) {
      if (!iso) return '';
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days}d ago`;
      return new Date(iso).toLocaleDateString();
    }

    // Open chat from URL params
    const params = new URLSearchParams(window.location.search);
    const withId = params.get('with');
    const withName = params.get('name');
    if (withId) {
      // Fetch partner data to get their photo
      (async () => {
        try {
          const res = await fetch('/api/members', { headers: { Authorization: `Bearer ${token}` } });
          const members = await res.json();
          const partner = members.find(m => m.id === parseInt(withId));
          const photo = partner ? (partner.photo || '') : '';
          openChat(parseInt(withId), withName || '', photo);
        } catch {
          openChat(parseInt(withId), withName || '', '');
        }
      })();
    }

    // ── Conversation list state ──
    let convosExpanded = false;
    let cachedConvos = [];

    function renderConvoItems(convos, extraClass = '') {
      return convos.map((c, i) => {
        const count = unreadCounts[c.id] || 0;
        return `
        <div class="convo-item ${c.id === currentPartnerId ? 'active' : ''} ${extraClass}"
             data-convo-id="${c.id}"
             onclick="openChat(${c.id}, '${escapeHtml(c.name || c.username)}', '${escapeHtml(c.photo || '')}', ${c.online}, '${escapeHtml(c.lastSeen || '')}')">
          <div class="convo-avatar-wrap">
            <img src="${c.photo || ''}" alt=""
              onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect width=%2240%22 height=%2240%22 fill=%22%23dcfce7%22/><text y=%22.9em%22 font-size=%2224%22 x=%224%22>👤</text></svg>'">
            ${count > 0 ? `<span class="unread-badge">${count > 99 ? '99+' : count}</span>` : ''}
            <span class="status-dot ${c.online ? 'online' : 'offline'}"></span>
          </div>
          <div class="convo-info">
            <strong>${escapeHtml(c.name || c.username)}</strong>
            <span class="${count > 0 ? 'convo-unread-preview' : ''}">${escapeHtml(c.last_message || '')}</span>
          </div>
        </div>`;
      }).join('');
    }

    async function loadConversations() {
      const res = await fetch('/api/conversations', { headers: { Authorization: `Bearer ${token}` } });
      let convos = await res.json();
      const list = document.getElementById('conversationList');

      if (!convos.length) {
        list.innerHTML = '<p class="no-convos">No messages yet.<br><a href="/discover">Browse members</a></p>';
        return;
      }

      // Sort by latest message time (newest first)
      convos.sort((a, b) => {
        const tA = a.last_message_time ? new Date(a.last_message_time).getTime() : 0;
        const tB = b.last_message_time ? new Date(b.last_message_time).getTime() : 0;
        return tB - tA;
      });

      // Cache for toggle without re-fetching
      cachedConvos = convos;

      const maxVisible = 5;
      const hasHidden = convos.length > maxVisible;
      const firstBatch = convos.slice(0, maxVisible);
      const hiddenBatch = convos.slice(maxVisible);

      // Build: first 5 items + extra wrapper (hidden by default) + toggle
      let html = renderConvoItems(firstBatch);

      if (hasHidden) {
        // Extra items in a collapsible wrapper
        const extraHtml = renderConvoItems(hiddenBatch, 'extra-item');
        const wrapperState = convosExpanded ? 'open' : '';
        html += `<div class="convo-extra ${wrapperState}" id="convoExtra">${extraHtml}</div>`;

        // Fade gradient + toggle button
        if (!convosExpanded) {
          html += `<div class="convo-fade"></div>`;
        }

        const toggleContent = convosExpanded
          ? `<span class="collapse-icon">▲</span>`
          : `<span class="plus-sign">+${hiddenBatch.length}</span>`;

        html += `<div class="convo-toggle-wrap"><button class="convo-more-toggle" onclick="toggleConvos()">${toggleContent}</button></div>`;
      }

      list.innerHTML = html;

      // If expanded, scroll to keep position
      if (convosExpanded) {
        requestAnimationFrame(() => {
          list.scrollTop = list.scrollHeight;
        });
      }
    }

    function toggleConvos() {
      convosExpanded = !convosExpanded;

      // Animate via CSS class on the extra wrapper
      const extraWrap = document.getElementById('convoExtra');
      const fade = document.querySelector('.convo-fade');
      const toggleBtn = document.querySelector('.convo-more-toggle');

      if (convosExpanded) {
        // Expand: open wrapper, remove fade, change button to ▲
        if (extraWrap) {
          extraWrap.classList.add('open');
          // Wait for animation to settle, then set max-height to none
          setTimeout(() => { extraWrap.style.maxHeight = 'none'; }, 350);
        }
        if (fade) fade.remove();
        if (toggleBtn) {
          toggleBtn.innerHTML = `<span class="collapse-icon">▲</span>`;
        }
      } else {
        // Collapse: close wrapper, add fade, change button to +N
        if (extraWrap) {
          extraWrap.style.maxHeight = '';
          extraWrap.classList.remove('open');
        }
        // Re-add fade element
        const wrap = document.querySelector('.convo-toggle-wrap');
        if (wrap && !document.querySelector('.convo-fade')) {
          const newFade = document.createElement('div');
          newFade.className = 'convo-fade';
          wrap.parentNode.insertBefore(newFade, wrap);
        }
        if (toggleBtn) {
          const hiddenCount = cachedConvos.length - 5;
          toggleBtn.innerHTML = `<span class="plus-sign">+${hiddenCount}</span>`;
        }
        // Scroll back to top of extra wrapper
        if (extraWrap) {
          extraWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }
    }

    async function openChat(partnerId, partnerName, partnerPhoto, online, lastSeen) {
      currentPartnerId = partnerId;
      // Clear unread count for this partner
      if (unreadCounts[partnerId]) {
        delete unreadCounts[partnerId];
        saveUnreadCounts();
        updateNavBadge();
      }
      document.getElementById('chatPlaceholder').classList.add('hidden');
      document.getElementById('chatWindow').classList.remove('hidden');
      document.getElementById('chatPartnerName').textContent = partnerName;
      document.getElementById('chatPartnerPhoto').src = partnerPhoto || '';
      updateChatStatus(online, lastSeen);
      document.getElementById('messages').innerHTML = '<div class="loading">Loading messages...</div>';

      // Highlight active convo
      document.querySelectorAll('.convo-item').forEach(el => el.classList.remove('active'));

      const res = await fetch(`/api/messages/${partnerId}`, { headers: { Authorization: `Bearer ${token}` } });
      const msgs = await res.json();
      const area = document.getElementById('messages');
      area.innerHTML = '';
      if (!msgs.length) {
        area.innerHTML = '<p class="no-msgs"><span class="icon">👋</span><span class="title">Start the conversation</span><span class="desc">Send a message, share a photo, or react with an emoji.</span></p>';
      } else {
        msgs.forEach(appendMessage);
      }
      area.scrollTop = area.scrollHeight;
      document.getElementById('messageInput').focus();

      // Update URL without reload
      history.replaceState(null, '', `/chat?with=${partnerId}&name=${encodeURIComponent(partnerName)}`);
      loadConversations();
    }

    function buildBubbleContent(msg) {
      if (msg.type === 'image') {
        return `<img class="chat-image" src="${escapeHtml(msg.content)}" alt="image" onclick="window.open('${escapeHtml(msg.content)}','_blank')">`;
      } else if (msg.type === 'file') {
        const name = escapeHtml(msg.fileName || 'file');
        return `<a class="chat-file" href="${escapeHtml(msg.content)}" download="${name}" target="_blank">
          <span class="chat-file-icon">📄</span><span class="chat-file-name">${name}</span></a>`;
      }
      return escapeHtml(msg.content);
    }

    function isEmojiOnly(str) {
      return /^[\p{Extended_Pictographic}\p{Emoji_Component}\s\uFE0F\u200D]+$/u.test(str.trim());
    }

    function appendMessage(msg) {
      // Never append the same message twice
      if (document.querySelector(`.message[data-msg-id="${msg.id}"]`)) return;
      const area = document.getElementById('messages');
      const noMsg = area.querySelector('.no-msgs');
      if (noMsg) noMsg.remove();

      const isMine = msg.sender_id === myId;
      const isEmoji = (msg.type === 'text' || !msg.type) && isEmojiOnly(msg.content || '');
      const div = document.createElement('div');
      div.className = `message ${isMine ? 'mine' : 'theirs'}${isEmoji ? ' emoji-only' : ''}`;
      div.dataset.msgId = msg.id;
      div.dataset.msgType = msg.type || 'text';
      div.dataset.msgContent = msg.content;
      div.dataset.msgTime = msg.created_at;

      const editedTag = msg.edited ? `<span class="edited-tag">(edited)</span>` : '';
      const canEdit = isMine && msg.type !== 'image' && msg.type !== 'file';
      const actions = isMine ? `
        <div class="msg-actions">
          ${canEdit ? `<button title="Edit" onclick="startEdit(${msg.id})">✏️</button>` : ''}
          <button title="Delete" onclick="confirmDelete(${msg.id})">🗑️</button>
        </div>` : '';

      div.innerHTML = `
        ${actions}
        <div class="bubble-wrap">
          <div class="bubble">${buildBubbleContent(msg)}</div>
          <span class="msg-time">${formatTime(msg.created_at)}${editedTag}</span>
        </div>
      `;
      area.appendChild(div);
      area.scrollTop = area.scrollHeight;
    }

    // ── Edit / Delete ─────────────────────────────────────────────
    function startEdit(msgId) {
      const div = document.querySelector(`.message[data-msg-id="${msgId}"]`);
      if (!div) return;
      const bubble = div.querySelector('.bubble');
      const original = div.dataset.msgContent;
      bubble.innerHTML = `
        <div class="edit-box">
          <input class="edit-input" value="${escapeHtml(original)}" maxlength="500">
          <div class="edit-btns">
            <button class="edit-confirm" onclick="confirmEdit(${msgId})">✓</button>
            <button class="edit-cancel" onclick="cancelEdit(${msgId}, \`${original.replace(/`/g,'\\`')}\`)">✕</button>
          </div>
        </div>`;
      const input = bubble.querySelector('.edit-input');
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') confirmEdit(msgId);
        if (e.key === 'Escape') cancelEdit(msgId, original);
      });
    }

    async function confirmEdit(msgId) {
      const div = document.querySelector(`.message[data-msg-id="${msgId}"]`);
      if (!div) return;
      const input = div.querySelector('.edit-input');
      const newContent = input?.value.trim();
      if (!newContent) return;
      try {
        await fetch(`/api/messages/${msgId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ content: newContent })
        });
      } catch (err) { console.error('Edit failed:', err); }
    }

    function cancelEdit(msgId, original) {
      const div = document.querySelector(`.message[data-msg-id="${msgId}"]`);
      if (!div) return;
      const bubble = div.querySelector('.bubble');
      bubble.innerHTML = escapeHtml(original);
    }

    async function confirmDelete(msgId) {
      if (!confirm('Delete this message?')) return;
      try {
        await fetch(`/api/messages/${msgId}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` }
        });
      } catch (err) { console.error('Delete failed:', err); }
    }

    // ── File attach ──────────────────────────────────────────────
    let pendingFile = null; // { url, type, fileName }

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) { showToast('File too large (max 10 MB)', 'error'); return; }

      const bar = document.getElementById('filePreviewBar');
      const content = document.getElementById('filePreviewContent');
      bar.classList.remove('hidden');

      if (file.type.startsWith('image/')) {
        const url = URL.createObjectURL(file);
        content.innerHTML = `<img src="${url}" class="file-preview-img" alt="preview"><span class="file-preview-label">${escapeHtml(file.name)}</span>`;
      } else {
        content.innerHTML = `<span class="file-preview-icon">📄</span><span class="file-preview-label">${escapeHtml(file.name)}</span>`;
      }

      // Upload immediately
      uploadFile(file);
    }

    async function uploadFile(file) {
      const btn = document.getElementById('attachBtn');
      btn.textContent = '⏳';
      btn.disabled = true;
      try {
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch('/api/chat/upload', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: formData
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        pendingFile = data;
        btn.textContent = '📎';
        btn.disabled = false;
      } catch (err) {
        showToast('Upload failed: ' + err.message, 'error');
        cancelFile();
        btn.textContent = '📎';
        btn.disabled = false;
      }
    }

    // ── Toast notification ──────────────────────────────────────
    function showToast(message, type = 'error') {
      const existing = document.querySelector('.chat-toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.className = 'chat-toast';
      toast.style.cssText = `
        padding: 10px 16px;
        margin: 0 16px 6px;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.4;
        background: #fef2f2;
        color: #dc2626;
        border: 1px solid #fecaca;
        animation: toastIn 0.25s ease-out;
        flex-shrink: 0;
      `;
      if (type === 'success') {
        toast.style.background = '#f0fdf4';
        toast.style.color = '#16a34a';
        toast.style.borderColor = '#bbf7d0';
      }
      toast.textContent = message;

      // Insert above the input area
      const inputArea = document.querySelector('.message-input-area');
      const chatWindow = inputArea?.closest('.chat-window');
      if (chatWindow) {
        chatWindow.insertBefore(toast, inputArea);
      } else if (inputArea) {
        inputArea.parentNode.insertBefore(toast, inputArea);
      }

      // Auto-dismiss after 4 seconds
      setTimeout(() => {
        toast.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(8px)';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // Also replace any other alert() calls related to uploads
    const origAlert = window.alert;
    window.alert = function(msg) {
      if (msg && msg.includes('Upload failed')) {
        showToast(msg.replace('Upload failed: ', ''), 'error');
        return;
      }
      origAlert.call(window, msg);
    };

    function cancelFile() {
      pendingFile = null;
      document.getElementById('fileInput').value = '';
      document.getElementById('filePreviewBar').classList.add('hidden');
      document.getElementById('filePreviewContent').innerHTML = '';
    }

    // ── Auto-resize textarea ────────────────────────────────────
    function autoResize(el) {
      el.style.height = 'auto';
      const maxH = parseInt(getComputedStyle(el).maxHeight) || 130;
      el.style.height = Math.min(el.scrollHeight, maxH) + 'px';
    }
    const msgInput = document.getElementById('messageInput');
    if (msgInput) {
      // Set initial height explicitly
      msgInput.style.height = '44px';
      msgInput.addEventListener('input', function() { autoResize(this); });
      msgInput.addEventListener('focus', function() { autoResize(this); });
      msgInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          this.closest('form').dispatchEvent(new Event('submit', { cancelable: true }));
        }
      });
    }

    async function sendMessage(e) {
      e.preventDefault();
      if (!currentPartnerId) return;

      const input = document.getElementById('messageInput');
      const content = input.value.trim();

      let payload = { receiverId: currentPartnerId };

      if (pendingFile) {
        payload.content = pendingFile.url;
        payload.type = pendingFile.type;
        payload.fileName = pendingFile.fileName;
        cancelFile();
      } else {
        if (!content) return;
        payload.content = content;
        payload.type = 'text';
      }

      try {
        const res = await fetch('/api/messages/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          sentMessageIds.add(data.id);
          // Optimistically append
          appendMessage(data);
          input.value = '';
          input.style.height = 'auto';
          // Ensure it resets to initial compact height
          requestAnimationFrame(() => { input.style.height = '44px'; });
        }
      } catch (err) {
        console.error('Send failed:', err);
      }
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function logout() {
      // Notify server to update lastSeen so we show as offline immediately
      fetch('/api/logout', {
        method: 'POST',
        headers: { Authorization: `Bearer ${localStorage.getItem('token')}` }
      }).catch(() => {}).finally(() => {
        localStorage.clear();
        window.location.href = '/';
      });
    }

    let currentEmojiCat = 'smileys';

    function renderEmojiGrid(cat) {
      const grid = document.getElementById('emojiGrid');
      grid.innerHTML = EMOJIS[cat].map(e =>
        `<button type="button" onclick="insertEmoji('${e}')">${e}</button>`
      ).join('');
    }

    function showEmojiCat(e, cat) {
      currentEmojiCat = cat;
      document.querySelectorAll('.emoji-tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      renderEmojiGrid(cat);
    }

    function toggleEmoji() {
      const picker = document.getElementById('emojiPicker');
      const btn = document.getElementById('emojiToggle');
      const isOpen = picker.classList.toggle('open');
      btn.classList.toggle('open', isOpen);
      if (isOpen) renderEmojiGrid(currentEmojiCat);
    }

    function insertEmoji(emoji) {
      const input = document.getElementById('messageInput');
      const pos = input.selectionStart;
      const val = input.value;
      input.value = val.slice(0, pos) + emoji + val.slice(pos);
      input.selectionStart = input.selectionEnd = pos + emoji.length;
      input.focus();
      autoResize(input);
    }

    // Close picker when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#emojiPicker') && !e.target.closest('#emojiToggle')) {
        document.getElementById('emojiPicker').classList.remove('open');
        document.getElementById('emojiToggle').classList.remove('open');
      }
    });

    loadConversations();

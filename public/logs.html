<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark - Error Logs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .topbar {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 54px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar h1 { font-size: 16px; font-weight: 700; color: #22c55e; }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .topbar-actions button {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      transition: all 0.15s;
    }
    .topbar-actions button:hover { border-color: #22c55e; color: #22c55e; }
    .topbar-actions button.danger:hover { border-color: #ef4444; color: #ef4444; }
    .topbar-actions .count { font-size: 12px; color: #64748b; }
    .main { max-width: 1100px; margin: 0 auto; padding: 20px 24px; }
    .log-list { list-style: none; }
    .log-line {
      padding: 8px 12px;
      border-bottom: 1px solid #1e293b;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line.timestamp { color: #64748b; }
    .log-line .ts  { color: #64748b; font-size: 11px; }
    .log-line .lvl { font-weight: 700; margin: 0 6px; }
    .log-line .lvl.INFO  { color: #22c55e; }
    .log-line .lvl.WARN  { color: #f59e0b; }
    .log-line .lvl.ERROR { color: #ef4444; }
    .log-line .msg { color: #e2e8f0; }
    .log-line .detail { color: #64748b; font-style: italic; }
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #475569;
    }
    .empty-state span { font-size: 48px; display: block; margin-bottom: 12px; }
    .auto-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #64748b;
    }
    .auto-refresh input { accent-color: #22c55e; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>📋 Error Logs</h1>
    <div class="topbar-actions">
      <span class="count" id="lineCount">0 lines</span>
      <label class="auto-refresh">
        <input type="checkbox" id="autoRefresh" checked onchange="toggleAuto()">
        Auto-refresh
      </label>
      <button onclick="loadLogs()">↻ Refresh</button>
      <button class="danger" onclick="clearLogs()">🗑 Clear</button>
      <button onclick="window.location.href='admin.html'">← Admin</button>
    </div>
  </div>

  <div class="main">
    <div class="log-list" id="logList">
      <div class="empty-state"><span>✅</span><p>No errors logged yet</p></div>
    </div>
  </div>

  <script>
    const adminToken = sessionStorage.getItem('adminToken');
    if (!adminToken) {
      window.location.href = 'admin.html';
    }

    let refreshInterval = null;
    const AUTO_REFRESH_SEC = 5;

    function toggleAuto() {
      const checked = document.getElementById('autoRefresh').checked;
      if (checked) startAuto();
      else stopAuto();
    }

    function startAuto() {
      stopAuto();
      refreshInterval = setInterval(loadLogs, AUTO_REFRESH_SEC * 1000);
    }

    function stopAuto() {
      if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
    }

    async function loadLogs() {
      try {
        const res = await fetch('/api/logs', {
          headers: { Authorization: `Bearer ${adminToken}` }
        });
        if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'admin.html'; return; }
        const data = await res.json();
        const lines = data.lines || [];
        document.getElementById('lineCount').textContent = `${lines.length} line${lines.length !== 1 ? 's' : ''}`;

        if (!lines.length) {
          document.getElementById('logList').innerHTML = '<div class="empty-state"><span>✅</span><p>No errors logged yet</p></div>';
          return;
        }

        document.getElementById('logList').innerHTML = lines.map(parseLine).join('');
      } catch (err) {
        console.error('Failed to load logs:', err);
      }
    }

    function parseLine(raw) {
      // Format: [2026-05-06T...] [LEVEL] Message — details
      const match = raw.match(/^\[([^\]]+)\]\s+\[(\w+)\]\s+(.+?)(?:\s+—\s+(.+))?$/);
      if (match) {
        const [, ts, level, msg, detail] = match;
        const cls = `log-line lvl-${level}`;
        const detailHtml = detail ? ` <span class="detail">— ${esc(detail)}</span>` : '';
        return `<div class="log-line"><span class="ts">${esc(ts)}</span> <span class="lvl ${level}">${esc(level)}</span> <span class="msg">${esc(msg)}</span>${detailHtml}</div>`;
      }
      return `<div class="log-line">${esc(raw)}</div>`;
    }

    async function clearLogs() {
      if (!confirm('Delete all log entries? This cannot be undone.')) return;
      try {
        const res = await fetch('/api/logs', {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${adminToken}` }
        });
        if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'admin.html'; return; }
        loadLogs();
      } catch (err) {
        alert('Failed to clear logs: ' + err.message);
      }
    }

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Start auto-refresh
    loadLogs();
    startAuto();
  </script>
</body>
</html>

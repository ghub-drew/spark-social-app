<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in - Spark</title>
  <link rel="icon" type="image/svg+xml" href="/spark-icon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a2f1a 0%, #14532d 35%, #166534 65%, #15803d 100%);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(24px);
      border-radius: 24px; padding: 40px;
      max-width: 380px; width: 100%;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0,0,0,0.3);
    }
    .spinner {
      width: 40px; height: 40px; margin: 0 auto 20px;
      border: 3px solid #e5e7eb; border-top-color: #16a34a;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 20px; font-weight: 700; color: #1a1a2e; margin: 0 0 6px; }
    p { font-size: 14px; color: #6b7280; margin: 0 0 20px; }
    .btn-retry {
      display: none; padding: 10px 24px;
      background: #16a34a; color: white; border: none;
      border-radius: 12px; font-size: 14px; font-weight: 600;
      cursor: pointer; margin: 0 auto;
    }
    .error-msg { color: #dc2626; font-size: 13px; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h2>Signing you in...</h2>
    <p id="statusText">Verifying your account...</p>
    <div id="errorMsg" class="error-msg"></div>
    <button class="btn-retry" id="retryBtn" onclick="location.reload()">Try Again</button>
  </div>

  <script>
    // Define handler FIRST, then CDN onload will find it
    async function handleCallback() {
      const statusEl = document.getElementById('statusText');
      const errorEl = document.getElementById('errorMsg');
      const retryBtn = document.getElementById('retryBtn');
      const spinner = document.getElementById('spinner');

      try {
        const hash = window.location.hash;
        if (!hash || !hash.includes('access_token')) {
          // Still on auth-callback but no hash = user landed here directly
          // Maybe Supabase already stored session in storage — try that
          const sb = window.supabase?.createClient(
            'https://hpezaqvtufrvvczyixwc.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwZXphcXZ0dWZydnZjenlpeHdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDk5MTksImV4cCI6MjA5MzcyNTkxOX0.WzUQH4ZGn33Omv02m0ZtQgdYCXihGnHsOuhJmwGPXXI'
          );
          if (sb) {
            const { data: { session } } = await sb.auth.getSession();
            if (session?.access_token) {
              const token = session.access_token;
              const email = session.user.email || '';
              const name = session.user.user_metadata?.full_name || session.user.email?.split('@')[0] || 'User';
              const avatar = session.user.user_metadata?.avatar_url || '';
              const res = await fetch('/api/auth/supabase-callback', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ access_token: token, email, name, avatar })
              });
              const data = await res.json();
              if (res.ok && data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('userId', data.userId);
                localStorage.setItem('username', data.username);
                window.location.href = data.hasProfile ? '/discover' : 'profile.html';
                return;
              }
            }
          }
          throw new Error('No authentication data found. Please try logging in again.');
        }

        statusEl.textContent = 'Verifying your account...';
        const params = new URLSearchParams(hash.substring(1));
        const accessToken = params.get('access_token');

        if (!accessToken) throw new Error('Invalid authentication response.');

        const sb = window.supabase.createClient(
          'https://hpezaqvtufrvvczyixwc.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwZXphcXZ0dWZydnZjenlpeHdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDk5MTksImV4cCI6MjA5MzcyNTkxOX0.WzUQH4ZGn33Omv02m0ZtQgdYCXihGnHsOuhJmwGPXXI'
        );
        const { data: { user }, error: userError } = await sb.auth.getUser(accessToken);
        if (userError || !user) throw new Error('Could not verify your identity.');

        const email = user.email || '';
        const name = user.user_metadata?.full_name || user.user_metadata?.name || email.split('@')[0] || 'User';
        const avatar = user.user_metadata?.avatar_url || user.user_metadata?.picture || '';

        const res = await fetch('/api/auth/supabase-callback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ access_token: accessToken, email, name, avatar })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to create session.');

        localStorage.setItem('token', data.token);
        localStorage.setItem('userId', data.userId);
        localStorage.setItem('username', data.username);
        window.location.href = data.hasProfile ? '/discover' : 'profile.html';
      } catch (err) {
        spinner.style.display = 'none';
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        retryBtn.style.display = 'inline-block';
        statusEl.textContent = 'Something went wrong';
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" onload="handleCallback()"></script>
</body>
</html>

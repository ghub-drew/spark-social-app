<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark - Changelog</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cl-page {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
      z-index: 1;
    }
    .cl-page h1 { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
    .cl-page .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 36px; }
    .cl-version {
      margin-bottom: 28px;
      padding: 24px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      border: 1px solid rgba(229,231,235,0.4);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .cl-version h2 { font-size: 18px; font-weight: 800; color: var(--primary); margin: 0 0 2px; }
    .cl-version .date { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .cl-version ul { margin: 0 0 0 18px; }
    .cl-version li { font-size: 13px; line-height: 1.6; color: #6b7280; margin-bottom: 3px; }
    .cl-version li code { font-family: 'Courier New', monospace; font-size: 12px; background: #f1f5f9; padding: 1px 6px; border-radius: 4px; color: #475569; }
    .cl-footer { text-align: center; padding: 20px 0; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 40px; }
    .cl-empty {
      text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="doc-topbar" style="background:white;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:18px;font-weight:800;color:var(--primary);">✦ Spark</span>
      <span style="background:#f0fdf4;color:var(--primary);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid #86efac;">Changelog</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button onclick="window.open('admin.html','_self')" style="background:none;border:1px solid #e5e7eb;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;color:#6b7280;font-family:'Inter',sans-serif;">← Admin</button>
      <button onclick="window.open('logs.html','_blank')" style="background:none;border:1px solid #e5e7eb;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;color:#6b7280;font-family:'Inter',sans-serif;">📋 Logs</button>
    </div>
  </div>

  <div class="cl-page">
    <h1>Changelog</h1>
    <p class="subtitle">Track all updates, features, and fixes for Spark.</p>
    <div id="changelogContainer">
      <div class="cl-empty">Loading...</div>
    </div>
    <div class="cl-footer">Spark - Social App | Changelog</div>
  </div>

  <script>
    async function loadChangelog() {
      try {
        const res = await fetch('/changelog.json');
        const data = await res.json();
        const container = document.getElementById('changelogContainer');

        if (!data.length) {
          container.innerHTML = '<div class="cl-empty">No changelog entries yet.</div>';
          return;
        }

        container.innerHTML = data.map((entry, i) => `
          <div class="cl-version" style="animation-delay: ${i * 0.1}s">
            <h2>${escapeHtml(entry.version)}</h2>
            <div class="date">${escapeHtml(entry.date)}</div>
            <ul>
              ${entry.items.map(item => `<li>${formatItem(escapeHtml(item))}</li>`).join('')}
            </ul>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('changelogContainer').innerHTML = '<div class="cl-empty">Failed to load changelog.</div>';
      }
    }

    function formatItem(s) {
      // Wrap URLs
      s = s.replace(/\bhttps?:\/\/[^\s]+/g, '<code>$&</code>');
      // Wrap standalone filenames like server.js, db.json, style.css
      s = s.replace(/\b([a-z0-9_-]+\.(js|json|css|html|png|jpg|jsx|ts|tsx|sql))\b/gi, '<code>$&</code>');
      // Wrap parenthesized code references like (logger.js, /api/logs, logs.html)
      s = s.replace(/\(([^)]+)\)/g, function(m) {
        var parts = m.slice(1, -1).split(', ');
        var formatted = parts.map(function(p) {
          p = p.trim();
          if (/^[a-z0-9_.\/-]+\.[a-z]{2,4}$/i.test(p)) return '<code>' + p + '</code>';
          if (/^\/[a-z0-9_\/-]+$/i.test(p)) return '<code>' + p + '</code>';
          return p;
        });
        return '(' + formatted.join(', ') + ')';
      });
      return s;
    }

    function escapeHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadChangelog();
  </script>
</body>
</html>
